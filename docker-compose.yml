services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: studysnap
    ports:
      - "5432:5432"
    volumes:
      - studysnap_pg:/var/lib/postgresql/data

volumes:
  studysnap_pg:
